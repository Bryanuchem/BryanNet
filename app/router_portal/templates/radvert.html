<!DOCTYPE html>
<html lang="en">

<head>

    <meta
        http-equiv="refresh"
        content="2; url={{ hotspot.link_orig }}"
    >

    <meta charset="utf-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <meta
        http-equiv="pragma"
        content="no-cache"
    >

    <meta
        http-equiv="expires"
        content="-1"
    >

    <title>

        Internet Hotspot - Advertisement

    </title>

    <link
        rel="stylesheet"
        href="css/main.css"
    >

    <script>

        let popup = null;

        function openOrig() {

            if (window.focus && popup) {

                popup.focus();

            }

            location.href = decodeURIComponent("{{ hotspot.link_orig_esc }}");

        }

        function openAd() {

            location.href = decodeURIComponent("{{ hotspot.link_redirect_esc }}");

        }

        function openAdvert() {

            if (window.name !== "hotspot_advert") {

                popup = window.open(

                    "{{ hotspot.link_redirect }}",

                    "hotspot_advert",

                    ""

                );

                setTimeout(openOrig, 1000);

                return;

            }

            setTimeout(openAd, 1000);

        }

    </script>

</head>

<body onload="openAdvert()">

    <div class="ie-fixMinHeight">

        <div class="main">

            <div class="wrap">

                <h1>

                    Advertisement

                </h1>

                <p>

                    If nothing happens,

                    <a
                        href="{{ hotspot.link_redirect }}"
                        target="hotspot_advert"
                    >
                        open the advertisement
                    </a>

                    manually.

                </p>

            </div>

        </div>

    </div>

</body>

</html>
